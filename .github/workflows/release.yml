name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm ci

      - name: Validate release
        run: npm run release:check

      - name: Build source archives
        run: |
          mkdir -p release-assets
          git archive --format=zip --output=release-assets/aitestbench-${GITHUB_REF_NAME}.zip HEAD
          git archive --format=tar.gz --output=release-assets/aitestbench-${GITHUB_REF_NAME}.tar.gz HEAD

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/aitestbench-${{ github.ref_name }}.zip
            release-assets/aitestbench-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
