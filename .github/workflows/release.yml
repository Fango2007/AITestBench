name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm ci

      - name: Validate release
        run: npm run release:check

      - name: Build source archives
        run: |
          mkdir -p release-assets
          git archive --format=zip --output=release-assets/aitestbench-${GITHUB_REF_NAME}.zip HEAD
          git archive --format=tar.gz --output=release-assets/aitestbench-${GITHUB_REF_NAME}.tar.gz HEAD

      - name: Extract changelog release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi

          awk -v version="$VERSION" '
            $0 == "## [" version "]" || $0 ~ "^## \\[" version "\\] - " {
              found = 1
              next
            }
            found && /^## \[/ {
              exit
            }
            found {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "No CHANGELOG.md section found for version ${VERSION}" >&2
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            release-assets/aitestbench-${{ github.ref_name }}.zip
            release-assets/aitestbench-${{ github.ref_name }}.tar.gz
